<ui:composition template="template.xhtml" xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:ui="http://xmlns.jcp.org/jsf/facelets" xmlns:p="http://primefaces.org/ui">
    <ui:define name="title">Editar Docente</ui:define>
    <ui:define name="content">
        <h1 class="page-title" style="color: #2980b9;">Actualizar Datos del Docente</h1><br/>
        <h:form>
            <p:panelGrid columns="2" columnClasses="ui-grid-col-3,ui-grid-col-9" layout="grid" styleClass="ui-fluid" style="max-width: 600px; background: transparent; border: none;">
                <p:outputLabel for="correo" value="Correo Electrónico (ID):" style="font-weight: bold; color: #2c3e50;"/>
                <p:inputText id="correo" value="#{controller.docenteActual.correo}" readonly="true" style="background-color: #f4f6f7;" />
                <p:outputLabel for="nombre" value="Nombre Completo:" style="font-weight: bold; color: #2c3e50;"/>
                <p:inputText id="nombre" value="#{controller.docenteActual.nombre}" required="true" />
                <p:outputLabel for="tipo" value="Tipo de Contrato:" style="font-weight: bold; color: #2c3e50;"/>
                <p:inputText id="tipo" value="#{controller.docenteActual.tipo}" required="true" />
                <p:outputLabel for="departamento" value="Departamento:" style="font-weight: bold; color: #2c3e50;"/>
                <p:inputText id="departamento" value="#{controller.docenteActual.departamento}" required="true" />
            </p:panelGrid>
            <div style="margin-top: 20px;">
                <p:commandButton value="Actualizar Docente" action="#{controller.actualizarDocente()}" icon="pi pi-check" styleClass="ui-button-success" style="margin-right: 10px;" />
                <p:button value="Cancelar" outcome="docentes" icon="pi pi-times" styleClass="ui-button-secondary" />
            </div>
        </h:form>
    </ui:define>
</ui:composition>
