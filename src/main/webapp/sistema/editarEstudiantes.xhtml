<ui:composition template="template.xhtml" 
                xmlns="http://www.w3.org/1999/xhtml" 
                xmlns:h="http://xmlns.jcp.org/jsf/html" 
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets" 
                xmlns:p="http://primefaces.org/ui">
    
    <ui:define name="title">Editar Estudiante</ui:define>
    
    <ui:define name="content">
        <h1 class="page-title" style="color: #2980b9;">Editar Datos del Estudiante</h1><br/>
        
        <h:form>
            <p:panelGrid columns="2" columnClasses="ui-grid-col-3,ui-grid-col-9" layout="grid" styleClass="ui-fluid" style="max-width: 600px; background: transparent; border: none;">
                
                <p:outputLabel for="doc" value="Documento de Identidad:" style="font-weight: bold; color: #2c3e50;"/>
                <p:inputText id="doc" value="#{controller.estudianteActual.documento}" readonly="true" style="background-color: #f4f6f7;" />
                
                <p:outputLabel for="nombre" value="Nombre Completo:" style="font-weight: bold; color: #2c3e50;"/>
                <p:inputText id="nombre" value="#{controller.estudianteActual.nombre}" required="true" />
                
                <p:outputLabel for="carrera" value="Carrera:" style="font-weight: bold; color: #2c3e50;"/>
                <p:inputText id="carrera" value="#{controller.estudianteActual.carrera}" required="true" />
                
                <p:outputLabel for="semestre" value="Semestre Actual:" style="font-weight: bold; color: #2c3e50;"/>
                <p:spinner id="semestre" value="#{controller.estudianteActual.semestreActual}" min="1" max="10" required="true" />
                
            </p:panelGrid>
            
            <div style="margin-top: 20px;">
                <p:commandButton value="Actualizar Estudiante" action="#{controller.actualizarEstudiante()}" icon="pi pi-check" styleClass="ui-button-success" style="margin-right: 10px;" />
                <p:button value="Cancelar" outcome="estudiantes" icon="pi pi-times" styleClass="ui-button-secondary" />
            </div>
        </h:form>
    </ui:define>
</ui:composition>
