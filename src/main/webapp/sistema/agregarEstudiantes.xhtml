<ui:composition template="template.xhtml" 
                xmlns="http://www.w3.org/1999/xhtml" 
                xmlns:h="http://xmlns.jcp.org/jsf/html" 
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets" 
                xmlns:p="http://primefaces.org/ui">
                
    <ui:define name="title">Añadir Estudiante</ui:define>
    
    <ui:define name="content">
        <h1 class="page-title" style="color: #2980b9;">Registrar Nuevo Estudiante</h1><br/>
        
        <h:form>
            <p:panelGrid columns="2" columnClasses="ui-grid-col-3,ui-grid-col-9" layout="grid" styleClass="ui-fluid" style="max-width: 600px; background: transparent; border: none;">
                
                <p:outputLabel for="doc" value="Documento (ID):" style="font-weight: bold;"/>
                <p:inputText id="doc" value="#{controller.estudianteActual.documento}" required="true" placeholder="Ej: 1001234567"/>
                
                <p:outputLabel for="nom" value="Nombre Completo:" style="font-weight: bold;"/>
                <p:inputText id="nom" value="#{controller.estudianteActual.nombre}" required="true" placeholder="Ej: Juan Pérez" />

                <p:outputLabel for="correo" value="Correo Electrónico:" style="font-weight: bold;"/>
                <p:inputText id="correo" value="#{controller.estudianteActual.correo}" required="true" placeholder="ejemplo@unbosque.edu.co" />
                
                <p:outputLabel for="car" value="Carrera:" style="font-weight: bold;"/>
                <p:inputText id="car" value="#{controller.estudianteActual.carrera}" required="true" placeholder="Ej: Ing. de Sistemas" />
                
                <p:outputLabel for="sem" value="Semestre Actual:" style="font-weight: bold;"/>
                <p:spinner id="sem" value="#{controller.estudianteActual.semestreActual}" min="1" max="12" />
                
            </p:panelGrid>
            
            <div style="margin-top: 20px;">
                <p:commandButton value="Guardar Estudiante" action="#{controller.guardarEstudiante()}" icon="pi pi-save" styleClass="ui-button-success" />
                <p:button value="Cancelar" outcome="estudiantes" icon="pi pi-times" styleClass="ui-button-secondary" style="margin-left: 10px;" />
            </div>
        </h:form>
    </ui:define>
</ui:composition>
