<ui:composition template="template.xhtml" 
                xmlns="http://www.w3.org/1999/xhtml" 
                xmlns:h="http://xmlns.jcp.org/jsf/html" 
                xmlns:f="http://xmlns.jcp.org/jsf/core" 
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets" 
                xmlns:p="http://primefaces.org/ui">
    
    <ui:define name="title">Gestión de Estudiantes</ui:define>
    
    <ui:define name="content">
        <h1 class="page-title" style="color: #2980b9;">Gestión de Estudiantes</h1><br/>
        
        <h:form id="formEstudiantes">
            <p:toolbar style="margin-bottom: 20px; background: transparent; border: none;">
                <p:toolbarGroup>
                    <p:commandButton value="Nuevo Estudiante" action="agregarEstudiantes?faces-redirect=true" icon="pi pi-plus" styleClass="ui-button-success" />
                </p:toolbarGroup>
                <p:toolbarGroup align="right">
                    <p:commandButton value="Matricular Estudiante" action="inscribir?faces-redirect=true" icon="pi pi-check-square" styleClass="ui-button-info" />
                </p:toolbarGroup>
            </p:toolbar>

            <p:dataTable value="#{controller.listaEstudiantes}" var="est" styleClass="tabla-transparente" emptyMessage="No hay estudiantes registrados." paginator="true" rows="10">
                <p:column headerText="Documento">
                    <h:outputText value="#{est.documento}" />
                </p:column>
                <p:column headerText="Nombre">
                    <h:outputText value="#{est.nombre}" />
                </p:column>
                <p:column headerText="Carrera">
                    <h:outputText value="#{est.carrera}" />
                </p:column>
                <p:column headerText="Semestre">
                    <h:outputText value="#{est.semestreActual}" />
                </p:column>
                <p:column headerText="Créditos Matriculados">
                    <h:outputText value="#{est.creditosMatriculados} / 18" style="font-weight: bold; color: #{est.creditosMatriculados eq 18 ? 'red' : 'green'};" />
                </p:column>
            </p:dataTable>
        </h:form>
    </ui:define>
</ui:composition>
