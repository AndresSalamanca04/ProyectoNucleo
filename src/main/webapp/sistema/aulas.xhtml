<ui:composition template="template.xhtml" xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:ui="http://xmlns.jcp.org/jsf/facelets" xmlns:p="http://primefaces.org/ui">
    <ui:define name="title">Gestión de Aulas</ui:define>
    <ui:define name="content">
        <h:form id="formAulas">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div>
                    <h1 style="color: #2980b9;">Gestión de Aulas</h1>
                    <p style="color: #555;">Gestiona los espacios físicos, laboratorios y auditorios de la institución.</p>
                </div>
                <p:commandButton value="Registrar Aula" icon="pi pi-plus" action="#{controller.irAgregarAula()}" styleClass="ui-button-success" />
            </div>
            
            <p:dataTable value="#{controller.listaAulas}" var="aul" emptyMessage="No hay aulas registradas." paginator="true" rows="10" styleClass="tabla-transparente">
                <p:column headerText="NÚMERO"><h:outputText value="#{aul.numero}" style="font-weight: bold;" /></p:column>
                <p:column headerText="TIPO"><h:outputText value="#{aul.tipo}" /></p:column>
                <p:column headerText="CAPACIDAD"><h:outputText value="#{aul.capacidad} estudiantes" /></p:column>
                <p:column headerText="ACCIONES" style="width: 120px; text-align: center;">
                    <p:commandButton icon="pi pi-pencil" action="#{controller.editarAula(aul)}" styleClass="ui-button-warning ui-button-flat" style="margin-right: 5px;" />
                    <p:commandButton icon="pi pi-trash" action="#{controller.borrarAula(aul)}" update="formAulas" styleClass="ui-button-danger ui-button-flat">
                        <p:confirm header="Confirmación" message="¿Borrar esta aula?" icon="pi pi-exclamation-triangle" />
                    </p:commandButton>
                </p:column>
            </p:dataTable>
            
            <p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" width="350">
                <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-flat"/>
                <p:commandButton value="Sí" type="button" styleClass="ui-confirmdialog-yes ui-button-danger" />
            </p:confirmDialog>
        </h:form>
    </ui:define>
</ui:composition>
