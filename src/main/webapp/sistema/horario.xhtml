<ui:composition template="template.xhtml" 
                xmlns="http://www.w3.org/1999/xhtml" 
                xmlns:h="http://xmlns.jcp.org/jsf/html" 
                xmlns:f="http://xmlns.jcp.org/jsf/core" 
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets" 
                xmlns:p="http://primefaces.org/ui">
                
    <ui:define name="title">Gestión de Horarios</ui:define>
    
    <ui:define name="content">
        <h:form id="formHorarios">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div>
                    <h1 style="color: #2980b9;">Asignación de Horarios</h1>
                    <p style="color: #555;">Planifica la asignación de docentes, cursos y aulas por franjas horarias.</p>
                </div>
                
                <p:commandButton value="Añadir Horario" 
                                 icon="pi pi-calendar-plus" 
                                 action="#{controller.irAgregarHorario()}" 
                                 process="@this" 
                                 immediate="true" 
                                 ajax="false" 
                                 styleClass="ui-button-success" />
            </div>
            
            <p:dataTable value="#{controller.listaHorarios}" var="hor" emptyMessage="No hay horarios asignados." paginator="true" rows="10" styleClass="tabla-transparente">
                <p:column headerText="DÍA"><h:outputText value="#{hor.dia}" style="font-weight: bold; color: #2c3e50;"/></p:column>
                <p:column headerText="HORA"><h:outputText value="#{hor.hora}" /></p:column>
                <p:column headerText="DOCENTE"><h:outputText value="#{hor.docente}" /></p:column>
                <p:column headerText="CURSO"><h:outputText value="#{hor.curso}" /></p:column>
                <p:column headerText="AULA"><h:outputText value="#{hor.aula}" /></p:column>
                <p:column headerText="ACCIONES" style="width: 120px; text-align: center;">
                    
                    <p:commandButton icon="pi pi-pencil" 
                                     action="#{controller.editarHorario(hor)}" 
                                     process="@this" 
                                     immediate="true" 
                                     ajax="false" 
                                     styleClass="ui-button-warning ui-button-flat" style="margin-right: 5px;" />
                    
                    <p:commandButton icon="pi pi-trash" action="#{controller.borrarHorario(hor)}" update="formHorarios" process="@this" styleClass="ui-button-danger ui-button-flat">
                        <p:confirm header="Confirmación" message="¿Eliminar esta asignación de horario?" icon="pi pi-exclamation-triangle" />
                    </p:commandButton>
                </p:column>
            </p:dataTable>
            
            <p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" width="350">
                <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-flat"/>
                <p:commandButton value="Sí" type="button" styleClass="ui-confirmdialog-yes ui-button-danger" />
            </p:confirmDialog>
        </h:form>
    </ui:define>
</ui:composition>
