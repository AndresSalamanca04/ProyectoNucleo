<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title><ui:insert name="title">Universidad</ui:insert></title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        
        /* 1. IMAGEN DE FONDO GLOBAL */
        body {
            display: flex;
            height: 100vh;
            /* La ruta asume que tu imagen se llama interfaz_1.jpg. Cámbiala a .png si es necesario */
            background: url("#{resource['images/interfaz_1.jpg']}") no-repeat center center fixed !important;
            background-size: cover !important;
        }

        /* Sidebar oscuro intacto */
        .sidebar { width: 250px; background-color: #1a252f; color: white; display: flex; flex-direction: column; box-shadow: 2px 0 5px rgba(0,0,0,0.5); z-index: 10; }
        .sidebar h2 { padding: 20px; font-size: 1.5rem; font-weight: 600; border-bottom: 1px solid #2c3e50; margin-bottom: 10px; }
        .sidebar a { color: white; text-decoration: none; padding: 15px 20px; display: block; font-size: 1rem; transition: background 0.3s; }
        .sidebar a:hover { background-color: #34495e; border-left: 4px solid #3498db; }

        /* Contenedor central semi-transparente para que se pueda leer el contenido */
        .main-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            background-color: rgba(255, 255, 255, 0.85); /* 85% blanco para que resalte sobre la imagen */
            margin: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        /* 2. ESTILOS PARA LA TABLA TRANSPARENTE Y CON BORDES */
        .tabla-transparente .ui-datatable-header,
        .tabla-transparente .ui-paginator,
        .tabla-transparente th,
        .tabla-transparente td,
        .tabla-transparente tr {
            background: transparent !important;
            border: 1px solid #2c3e50 !important;
        }
        .tabla-transparente th {
            background-color: rgba(44, 62, 80, 0.1) !important; /* Un gris muuuy suave solo para diferenciar la cabecera */
            font-weight: bold !important;
            color: #2c3e50 !important;
        }

        /* Animación para las tarjetas del inicio */
        .dashboard-card { transition: transform 0.2s ease, box-shadow 0.2s ease; border-radius: 12px !important; border: 1px solid #bdc3c7; cursor: pointer; }
        .dashboard-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.15) !important; }
    </style>
</h:head>
<h:body>
    <div class="sidebar">
        <h2>Universidad</h2>
        <h:link outcome="inicio" value="Inicio" />
        <h:link outcome="docentes" value="Docentes" />
        <h:link outcome="cursos" value="Cursos" />
        <h:link outcome="aulas" value="Aulas" />
        <h:link outcome="horario" value="Horarios" />
    </div>

    <div class="main-content">
        <ui:insert name="content">
            </ui:insert>
    </div>
</h:body>
</html>
