<ui:composition template="template.xhtml" xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:ui="http://xmlns.jcp.org/jsf/facelets" xmlns:p="http://primefaces.org/ui">
    <ui:define name="title">Agregar Docente</ui:define>
    <ui:define name="content">
        <h1 class="page-title">Registrar Nuevo Docente</h1><br/>
        <h:form>
            <p:panelGrid columns="2" columnClasses="ui-grid-col-3,ui-grid-col-9" layout="grid" styleClass="ui-fluid" style="max-width: 600px; border: none;">
                
                <p:outputLabel for="nombre" value="Nombre Completo:" />
                <p:inputText id="nombre" value="#{controller.docenteActual.nombre}" required="true" />

                <p:outputLabel for="correo" value="Correo Institucional:" />
                <p:inputText id="correo" value="#{controller.docenteActual.correo}" required="true" />

                <p:outputLabel for="tipo" value="Tipo de Contrato:" />
                <p:selectOneMenu id="tipo" value="#{controller.docenteActual.tipo}" required="true">
                    <f:selectItem itemLabel="Seleccione un tipo" itemValue="" noSelectionOption="true" />
                    <f:selectItem itemLabel="Tiempo Completo" itemValue="Tiempo Completo" />
                    <f:selectItem itemLabel="Medio Tiempo" itemValue="Medio Tiempo" />
                    <f:selectItem itemLabel="Cátedra" itemValue="Cátedra" />
                </p:selectOneMenu>

                <p:outputLabel for="departamento" value="Departamento:" />
                <p:inputText id="departamento" value="#{controller.docenteActual.departamento}" required="true" />

                <p:outputLabel for="disponibilidad" value="Disponibilidad:" />
                <p:selectOneMenu id="disponibilidad" value="#{controller.docenteActual.disponibilidad}" required="true">
                    <f:selectItem itemLabel="Seleccione disponibilidad" itemValue="" noSelectionOption="true" />
                    <f:selectItem itemLabel="Disponible" itemValue="Disponible" />
                    <f:selectItem itemLabel="Ocupado" itemValue="Ocupado" />
                    <f:selectItem itemLabel="En Licencia" itemValue="En Licencia" />
                </p:selectOneMenu>

            </p:panelGrid>
            
            <div style="margin-top: 20px;">
                <p:commandButton value="Guardar Docente" action="#{controller.guardarDocente()}" icon="pi pi-save" styleClass="ui-button-success" style="margin-right: 10px;" />
                <p:button value="Cancelar" outcome="docentes" icon="pi pi-times" styleClass="ui-button-secondary" />
            </div>
        </h:form>
    </ui:define>
</ui:composition>
