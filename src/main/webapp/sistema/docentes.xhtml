<ui:composition template="template.xhtml" xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:ui="http://xmlns.jcp.org/jsf/facelets" xmlns:p="http://primefaces.org/ui">
    <ui:define name="title">Gestión de Docentes</ui:define>
    <ui:define name="content">
        <h:form id="formDocentes">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div><h1 style="color: #2980b9;">Gestión de Docentes</h1><p style="color: #555;">Administra el personal docente y sus asignaciones.</p></div>
                <p:commandButton value="Registrar Docente" icon="pi pi-plus" action="#{controller.irAgregarDocente()}" styleClass="ui-button-success" />
            </div>

            <p:dataTable value="#{controller.listaDocentes}" var="doc" emptyMessage="No hay docentes registrados." paginator="true" rows="10" styleClass="tabla-transparente">
                <p:column headerText="NOMBRE"><h:outputText value="#{doc.nombre}" /></p:column>
                <p:column headerText="CORREO"><h:outputText value="#{doc.correo}" /></p:column>
                <p:column headerText="TIPO"><h:outputText value="#{doc.tipo}" /></p:column>
                <p:column headerText="DEPARTAMENTO"><h:outputText value="#{doc.departamento}" /></p:column>
                <p:column headerText="DISPONIBILIDAD">
                    <p:badge value="#{doc.disponibilidad}" severity="#{doc.disponibilidad == 'Disponible' ? 'success' : (doc.disponibilidad == 'Ocupado' ? 'warning' : 'danger')}" />
                </p:column>
                <p:column headerText="ACCIONES" style="width: 120px; text-align: center;">
                    <p:commandButton icon="pi pi-pencil" action="#{controller.editarDocente(doc)}" styleClass="ui-button-warning ui-button-flat" style="margin-right: 5px;" title="Editar" />
                    <p:commandButton icon="pi pi-trash" action="#{controller.borrarDocente(doc)}" update="formDocentes" styleClass="ui-button-danger ui-button-flat" title="Eliminar">
                        <p:confirm header="Confirmación" message="¿Seguro que deseas borrar este docente?" icon="pi pi-exclamation-triangle" />
                    </p:commandButton>
                </p:column>
            </p:dataTable>

            <p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" width="350">
                <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-flat"/>
                <p:commandButton value="Sí" type="button" styleClass="ui-confirmdialog-yes ui-button-danger" />
            </p:confirmDialog>
        </h:form>
    </ui:define>
</ui:composition>
