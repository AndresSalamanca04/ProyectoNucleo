<ui:composition template="template.xhtml" xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:ui="http://xmlns.jcp.org/jsf/facelets" xmlns:p="http://primefaces.org/ui">
    <ui:define name="title">Añadir Curso</ui:define>
    <ui:define name="content">
        <h1 class="page-title" style="color: #2980b9;">Registrar Nueva Materia</h1><br/>
        <h:form>
            <p:panelGrid columns="2" columnClasses="ui-grid-col-3,ui-grid-col-9" layout="grid" styleClass="ui-fluid" style="max-width: 600px; background: transparent; border: none;">
                <p:outputLabel for="codigo" value="Código de Materia:" style="font-weight: bold; color: #2c3e50;"/>
                <p:inputText id="codigo" value="#{controller.cursoActual.codigo}" required="true" />
                <p:outputLabel for="nombre" value="Nombre del Curso:" style="font-weight: bold; color: #2c3e50;"/>
                <p:inputText id="nombre" value="#{controller.cursoActual.nombre}" required="true" />
                <p:outputLabel for="creditos" value="Créditos:" style="font-weight: bold; color: #2c3e50;"/>
                <p:spinner id="creditos" value="#{controller.cursoActual.creditos}" min="1" max="10" required="true" />
                
                <p:outputLabel for="docente" value="Docente Asignado:" style="font-weight: bold; color: #2c3e50;"/>
                <p:selectOneMenu id="docente" value="#{controller.cursoActual.docenteAsignado}" filter="true" filterMatchMode="contains">
                    <f:selectItem itemLabel="-- Seleccione un profesor --" itemValue="" noSelectionOption="true" />
                    <f:selectItems value="#{controller.listaDocentes}" var="d" itemLabel="#{d.nombre}" itemValue="#{d.nombre}" />
                </p:selectOneMenu>
            </p:panelGrid>
            <div style="margin-top: 20px;">
                <p:commandButton value="Guardar" action="#{controller.guardarCurso()}" icon="pi pi-save" styleClass="ui-button-success" style="margin-right: 10px;" />
                <p:button value="Cancelar" outcome="cursos" icon="pi pi-times" styleClass="ui-button-secondary" />
            </div>
        </h:form>
    </ui:define>
</ui:composition>
