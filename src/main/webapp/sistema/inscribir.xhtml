<ui:composition template="template.xhtml" 
                xmlns="http://www.w3.org/1999/xhtml" 
                xmlns:h="http://xmlns.jcp.org/jsf/html" 
                xmlns:f="http://xmlns.jcp.org/jsf/core" 
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets" 
                xmlns:p="http://primefaces.org/ui">
    
    <ui:define name="title">Matrícula</ui:define>
    
    <ui:define name="content">
        <h1 class="page-title" style="color: #2980b9;">Inscripción Oficial</h1>
        <p style="margin-bottom: 20px; color: #7f8c8d;">Solo se muestran las clases que ya han sido publicadas oficialmente por la universidad.</p>
        
        <h:form>
            <p:panelGrid columns="2" columnClasses="ui-grid-col-3,ui-grid-col-9" layout="grid" styleClass="ui-fluid" style="max-width: 700px; background: transparent; border: none;">
                
                <p:outputLabel for="estudiante" value="Estudiante:" style="font-weight: bold; color: #2c3e50;"/>
                <p:selectOneMenu id="estudiante" value="#{controller.estudianteSeleccionadoId}" required="true" filter="true" filterMatchMode="contains">
                    <f:selectItem itemLabel="-- Elija un estudiante --" itemValue="" noSelectionOption="true" />
                    <f:selectItems value="#{controller.listaEstudiantes}" var="est" itemLabel="#{est.nombre} (#{est.documento})" itemValue="#{est.documento}" />
                </p:selectOneMenu>

                <p:outputLabel for="horario" value="Clase Disponible:" style="font-weight: bold; color: #2c3e50;"/>
                <p:selectOneMenu id="horario" value="#{controller.horarioSeleccionadoId}" required="true" filter="true" filterMatchMode="contains">
                    <f:selectItem itemLabel="-- Elija una clase publicada --" itemValue="" noSelectionOption="true" />
                    <!-- ¡Ojo aquí! Ya no llama a listaHorarios, llama a horariosPublicados -->
                    <f:selectItems value="#{controller.horariosPublicados}" var="hor" itemLabel="#{hor.curso} | #{hor.dia} #{hor.hora} | Prof: #{hor.docente}" itemValue="#{hor.id}" />
                </p:selectOneMenu>

            </p:panelGrid>
            
            <div style="margin-top: 20px;">
                <p:commandButton value="Matricular" action="#{controller.inscribirMateria()}" icon="pi pi-check" styleClass="ui-button-success" style="margin-right: 10px;" />
                <p:button value="Volver" outcome="estudiantes" icon="pi pi-arrow-left" styleClass="ui-button-secondary" />
            </div>
        </h:form>
    </ui:define>
</ui:composition>
