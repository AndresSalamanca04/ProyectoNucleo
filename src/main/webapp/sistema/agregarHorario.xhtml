<ui:composition template="template.xhtml" 
                xmlns="http://www.w3.org/1999/xhtml" 
                xmlns:h="http://xmlns.jcp.org/jsf/html" 
                xmlns:f="http://xmlns.jcp.org/jsf/core" 
                xmlns:ui="http://xmlns.jcp.org/jsf/facelets" 
                xmlns:p="http://primefaces.org/ui">
                
    <ui:define name="title">Añadir Horario</ui:define>
    <ui:define name="content">
        <h1 class="page-title" style="color: #2980b9;">Asignar Nuevo Horario</h1><br/>
        
        <h:form>
            <p:panelGrid columns="2" columnClasses="ui-grid-col-3,ui-grid-col-9" layout="grid" styleClass="ui-fluid" style="max-width: 600px; border: none; background: transparent;">
                
                <p:outputLabel for="dia" value="Día de la Semana:" style="font-weight: bold; color: #2c3e50;" />
                <p:selectOneMenu id="dia" value="#{controller.horarioActual.dia}" required="true">
                    <f:selectItem itemLabel="Seleccione el día" itemValue="" noSelectionOption="true" />
                    <f:selectItem itemLabel="Lunes" itemValue="Lunes" />
                    <f:selectItem itemLabel="Martes" itemValue="Martes" />
                    <f:selectItem itemLabel="Miércoles" itemValue="Miércoles" />
                    <f:selectItem itemLabel="Jueves" itemValue="Jueves" />
                    <f:selectItem itemLabel="Viernes" itemValue="Viernes" />
                    <f:selectItem itemLabel="Sábado" itemValue="Sábado" />
                </p:selectOneMenu>

                <p:outputLabel for="hora" value="Franja Horaria:" style="font-weight: bold; color: #2c3e50;" />
                <p:selectOneMenu id="hora" value="#{controller.horarioActual.hora}" required="true">
                    <f:selectItem itemLabel="Seleccione una hora" itemValue="" noSelectionOption="true" />
                    <f:selectItem itemLabel="08:00 - 10:00" itemValue="08:00 - 10:00" />
                    <f:selectItem itemLabel="10:00 - 12:00" itemValue="10:00 - 12:00" />
                    <f:selectItem itemLabel="14:00 - 16:00" itemValue="14:00 - 16:00" />
                    <f:selectItem itemLabel="16:00 - 18:00" itemValue="16:00 - 18:00" />
                    <f:selectItem itemLabel="18:00 - 20:00" itemValue="18:00 - 20:00" />
                </p:selectOneMenu>

                <p:outputLabel for="docente" value="Docente Asignado:" style="font-weight: bold; color: #2c3e50;" />
                <p:selectOneMenu id="docente" value="#{controller.horarioActual.docente}" required="true" filter="true" filterMatchMode="contains">
                    <f:selectItem itemLabel="Seleccione un docente" itemValue="" noSelectionOption="true" />
                    <f:selectItems value="#{controller.listaDocentes}" var="d" itemLabel="#{d.nombre}" itemValue="#{d.nombre}" />
                </p:selectOneMenu>

                <p:outputLabel for="curso" value="Curso (Materia):" style="font-weight: bold; color: #2c3e50;" />
                <p:selectOneMenu id="curso" value="#{controller.horarioActual.curso}" required="true" filter="true" filterMatchMode="contains">
                    <f:selectItem itemLabel="Seleccione un curso" itemValue="" noSelectionOption="true" />
                    <f:selectItems value="#{controller.listaCursos}" var="c" itemLabel="#{c.nombre} (#{c.codigo})" itemValue="#{c.codigo}" />
                </p:selectOneMenu>

                <p:outputLabel for="aula" value="Aula Asignada:" style="font-weight: bold; color: #2c3e50;" />
                <p:selectOneMenu id="aula" value="#{controller.horarioActual.aula}" required="true" filter="true" filterMatchMode="contains">
                    <f:selectItem itemLabel="Seleccione un aula" itemValue="" noSelectionOption="true" />
                    <f:selectItems value="#{controller.listaAulas}" var="a" itemLabel="Aula #{a.numero} (Cap: #{a.capacidad})" itemValue="#{a.numero}" />
                </p:selectOneMenu>

            </p:panelGrid>
            
            <div style="margin-top: 20px;">
                <p:commandButton value="Guardar Horario" action="#{controller.guardarHorario()}" icon="pi pi-save" styleClass="ui-button-success" style="margin-right: 10px;" />
                <p:button value="Cancelar" outcome="horario" icon="pi pi-times" styleClass="ui-button-secondary" />
            </div>
        </h:form>
    </ui:define>
</ui:composition>
